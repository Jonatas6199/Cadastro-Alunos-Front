<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    <!--
    <script src="script2.js"></script>
    -->
</head>
<body>

<h1>Cadastro de Alunos</h1>

<div class="form">
    <input type="text" placeholder="Nome" id="nome">
    <input type="number" placeholder="Idade" id="idade">
    <input type="number" placeholder="Nota" id="nota">
    <button onclick="cadastrarAluno()">Cadastrar</button>
    <!--
    <button onclick="retornarAlunosDaApi()">Listar no Console</button>
    -->
</div>

<h2>Lista de Alunos</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Idade</th>
            <th>Nota</th>
        </tr>
    </thead>
    <tbody id="tabela-alunos">
        <!-- Aqui os alunos aparecerão -->
    </tbody>
</table>

</body>
</html>
